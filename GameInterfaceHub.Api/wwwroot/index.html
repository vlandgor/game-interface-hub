<!DOCTYPE html>
<html>
<head>
    <title>Game UI Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">GAME UI HUB</div>
    <nav>
        <select id="platform-selector">
            <option value="0">All Platforms</option>
            <option value="1">Desktop</option>
            <option value="2">Mobile</option>
            <option value="3">VR</option>
        </select>
    </nav>
    <div style="font-size: 0.85rem; color: #444;">Search...</div>
</header>

<div class="main-container">
    <aside>
        <div class="filter-section">
            <h4>Upload</h4>
            <div id="drop-zone">
                <span>Click or Drop<br>Screenshot</span>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>

        <div class="filter-section">
            <h4>Categories</h4>
            <div class="filter-item">HUD</div>
            <div class="filter-item">Main Menu</div>
            <div class="filter-item">Inventory</div>
        </div>

        <div class="filter-section">
            <h4>Tags</h4>
            <div class="filter-item">Minimalist</div>
            <div class="filter-item">Sci-Fi</div>
            <div class="filter-item">Fantasy</div>
        </div>
    </aside>

    <main>
        <div id="gallery"></div>
    </main>
</div>
<div id="upload-panel" style="display: none;">
    <div class="panel-content">
        <h3>Prepare Upload</h3>
        <div class="preview-container">
            <img id="staging-preview" src="" alt="Preview">
        </div>

        <div class="upload-form">
            <div class="form-group">
                <label>Game Title</label>
                <input type="text" id="input-game-title" placeholder="e.g. RoboTag">
            </div>

            <div class="form-group">
                <label>Platform</label>
                <select id="input-platform">
                    <option value="1">Desktop</option>
                    <option value="2">Mobile</option>
                    <option value="3">VR</option>
                </select>
            </div>

            <div class="button-group">
                <button id="btn-cancel" class="btn-secondary">Cancel</button>
                <button id="btn-confirm-upload" class="btn-primary">Upload to Hub</button>
            </div>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
