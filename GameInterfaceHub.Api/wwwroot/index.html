<!DOCTYPE html>
<html>
<head>
    <title>Game UI Hub</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #1e1e1e; color: white; }

        #drop-zone {
            width: 500px; height: 300px; border: 3px dashed #555;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; transition: 0.3s;
            margin-bottom: 40px; /* Added some space below the box */
        }

        #drop-zone.hover { border-color: #4cc9f0; background: #2a2a2a; transform: scale(1.02); }

        /* --- New Gallery Styles --- */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .screenshot-card {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 10px;
        }

        .screenshot-card img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div id="drop-zone">Drag and drop a game screenshot here</div>
<div id="gallery"></div>

<script>
    const zone = document.getElementById('drop-zone');

    zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('hover'); };
    zone.ondragleave = () => zone.classList.remove('hover');

    zone.ondrop = async (e) => {
        e.preventDefault();
        zone.classList.remove('hover');

        const file = e.dataTransfer.files[0];
        const formData = new FormData();
        formData.append('file', file); // 'file' must match the parameter name in your Controller

        const response = await fetch('http://localhost:5069/api/screenshots/upload', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            const data = await response.json();
            alert('Uploaded to: ' + data.path);
        } else {
            alert('Upload failed!');
        }
    };

    async function loadGallery() {
        try {
            const response = await fetch('http://localhost:5069/api/screenshots');
            const screenshots = await response.json();
            const gallery = document.getElementById('gallery');

            gallery.innerHTML = screenshots.map(s => `
                    <div class="screenshot-card">
                        <img src="${s.filePath}" alt="${s.gameTitle}">
                        <div><strong>${s.gameTitle || 'Untitled'}</strong></div>
                        <small>${new Date(s.uploadedAt).toLocaleDateString()}</small>
                    </div>
                `).join('');
        } catch (err) {
            console.error("Failed to load gallery:", err);
        }
    }

    loadGallery();
</script>
</body>
</html>
