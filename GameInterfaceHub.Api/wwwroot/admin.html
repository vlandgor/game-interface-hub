<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Game UI Hub</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<header style="height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: white; border-bottom: 1px solid #e2e8f0; margin-bottom: 30px;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-weight: 800; letter-spacing: 1px; color: #1e293b;">ADMIN PANEL</span>
        <span style="color: #cbd5e1;">|</span>
        <span style="font-size: 0.85rem; color: #64748b;">Manage Metadata</span>
    </div>

    <nav>
        <a href="index.html" style="text-decoration: none; font-size: 0.85rem; color: #2563eb; font-weight: 600;">← BACK TO HUB</a>
    </nav>
</header>

<div class="admin-grid">
    <div class="admin-card">
        <h2>Manage Platforms</h2>
        <div class="input-group">
            <input type="text" id="new-platforms-name" placeholder="e.g. PS5, PC, Mobile">
            <button id="add-platform-btn">Add Platform</button>
        </div>
        <ul id="platforms-list" class="list-container"></ul>
    </div>

    <div class="admin-card">
        <h2>Manage Categories</h2>
        <div class="input-group">
            <input type="text" id="new-categories-name" placeholder="e.g. HUD, Inventory, Menu">
            <button id="add-category-btn">Add Category</button>
        </div>
        <ul id="categories-list" class="list-container"></ul>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
