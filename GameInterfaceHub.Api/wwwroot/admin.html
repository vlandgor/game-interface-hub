<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Game UI Hub</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-grid">
    <div class="admin-card">
        <h2>Manage Platforms</h2>
        <div class="input-group">
            <input type="text" id="new-platforms-name" placeholder="e.g. PS5, PC, Mobile">
            <button id="add-platform-btn">Add Platform</button>
        </div>
        <ul id="platforms-list" class="list-container"></ul>
    </div>

    <div class="admin-card">
        <h2>Manage Categories</h2>
        <div class="input-group">
            <input type="text" id="new-categories-name" placeholder="e.g. HUD, Inventory, Menu">
            <button id="add-category-btn">Add Category</button>
        </div>
        <ul id="categories-list" class="list-container"></ul>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
