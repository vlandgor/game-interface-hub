<!DOCTYPE html>
<html>
<head>
    <title>Game UI Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">GAME UI HUB</div>

    <div class="header-center">
        <select id="platform-selector">
            <option value="0">All Platforms</option>
        </select>
    </div>

    <div class="header-right">
        <a href="admin.html" class="btn-admin-link">ADMIN</a>
    </div>
</header>

<div class="main-container">
    <main>
        <section class="search-hero">
            <h1>Discover Game Interfaces</h1>
            <div class="search-bar-wrapper">
                <input type="text" id="search-input" placeholder="Type a tag and press Enter (e.g. #minimalist)...">
                <div id="active-tags-list" class="tag-chips-container"></div>
            </div>
        </section>

        <div id="gallery"></div>
    </main>
</div>

<div id="detail-panel" class="modal-overlay" style="display: none;">
    <div class="panel-content">
        <h3 id="detail-title">Screenshot Detail</h3>
        <div class="preview-container">
            <img id="detail-preview" src="" alt="Detail View">
        </div>
        <div class="info-group">
            <p><strong>Platform:</strong> <span id="detail-platform-label"></span></p>
            <p><strong>Uploaded:</strong> <span id="detail-date"></span></p>
        </div>
        <div class="button-group">
            <button id="btn-close-detail" class="btn-secondary">Close</button>
            <button id="btn-delete-screenshot" class="btn-danger">Delete Screenshot</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
