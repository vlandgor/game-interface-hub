<!DOCTYPE html>
<html>
<head>
    <title>Game UI Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">GAME UI HUB</div>
    <nav>
        <select id="platform-selector">
            <option value="0">All Platforms</option>
        </select>
    </nav>
    <div style="font-size: 0.85rem; color: #444;">Search...</div>
</header>

<div class="main-container">
    <aside>
        <div class="filter-section">
            <h4>Upload</h4>
            <div id="drop-zone">
                <span>Click or Drop<br>Screenshot</span>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>

        <div class="filter-section">
            <h4>Categories</h4>
            <div id="category-filter-list">
            </div>
        </div>

        <div class="filter-section">
            <h4>Tags</h4>
            <div class="filter-item">Minimalist</div>
            <div class="filter-item">Sci-Fi</div>
            <div class="filter-item">Fantasy</div>
        </div>
    </aside>

    <main>
        <div id="gallery"></div>
    </main>
</div>
<div id="upload-panel" style="display: none;">
    <div class="panel-content">
        <h3>Prepare Upload</h3>
        <div class="preview-container">
            <img id="staging-preview" src="" alt="Preview">
        </div>

        <div class="upload-form">
            <div class="form-group">
                <label>Game Title</label>
                <input type="text" id="input-game-title" placeholder="e.g. RoboTag">
            </div>

            <div class="form-group">
                <label>Platform</label>
                <select id="input-platform">
                </select>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="input-category">
                </select>
            </div>

            <div class="button-group">
                <button id="btn-cancel" class="btn-secondary">Cancel</button>
                <button id="btn-confirm-upload" class="btn-primary">Upload to Hub</button>
            </div>
        </div>
    </div>
</div>
<div id="detail-panel" class="modal-overlay" style="display: none;">
    <div class="panel-content">
        <h3 id="detail-title">Screenshot Detail</h3>
        <div class="preview-container">
            <img id="detail-preview" src="" alt="Detail View">
        </div>

        <div class="info-group">
            <p><strong>Platform:</strong> <span id="detail-platform-label"></span></p>
            <p><strong>Uploaded:</strong> <span id="detail-date"></span></p>
        </div>

        <div class="button-group">
            <button id="btn-close-detail" class="btn-secondary">Close</button>
            <button id="btn-delete-screenshot" class="btn-danger">Delete Screenshot</button>
        </div>
    </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
